<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bagikan Lokasi</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 40px 30px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            text-align: center;
        }
        .icon { font-size: 64px; margin-bottom: 16px; color: #764ba2; }
        h1 { margin-bottom: 10px; font-weight: 600; color: #2d2d2d; }
        .btn {
            background: #764ba2;
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
            transition: transform 0.2s;
        }
        .btn:active { transform: scale(0.97); }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        .status {
            margin-top: 20px;
            padding: 12px;
            border-radius: 12px;
            font-weight: 500;
            background: #f3f4f6;
            min-height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .device-info {
            margin-top: 16px;
            font-size: 13px;
            color: #555;
            background: #f9f9f9;
            padding: 10px;
            border-radius: 10px;
            text-align: left;
        }
        .pulse {
            display: inline-block;
            width: 12px;
            height: 12px;
            background: #4CAF50;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
            margin-right: 6px;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(76,175,80,0.5); }
            70% { box-shadow: 0 0 0 10px rgba(76,175,80,0); }
            100% { box-shadow: 0 0 0 0 rgba(76,175,80,0); }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
</head>
<body>
    <div class="card">
        <div class="icon">📍</div>
        <h1>Bagikan Lokasi</h1>
        <p style="color: #666;">Lokasi dikirim setiap 10 detik</p>
        <div class="device-info" id="deviceInfo">
            <i class="fas fa-mobile-alt"></i> <span id="deviceIdDisplay">...</span>
            <br><small id="ipDisplay">Mengambil IP...</small>
        </div>
        <button class="btn" id="btnMulai" onclick="mulaiBagikan()">
            <i class="fas fa-play"></i> Mulai Berbagi
        </button>
        <div class="status" id="status">
            <span>⏳ Siap...</span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // ⚠️ Ganti dengan URL database kamu
        const firebaseConfig = {
            databaseURL: "https://lokaci-39db8-default-rtdb.asia-southeast1.firebasedatabase.app/"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const SECRET_ROOM = "yo"; // ganti dengan kata sandi kalian

        // Generate / ambil device ID dari localStorage
        let DEVICE_ID = localStorage.getItem('tracker_device_id');
        if (!DEVICE_ID) {
            DEVICE_ID = 'device_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('tracker_device_id', DEVICE_ID);
        }
        document.getElementById('deviceIdDisplay').textContent = 'ID: ' + DEVICE_ID;

        // Ambil IP publik (opsional, mungkin gagal di beberapa jaringan)
        let publicIP = 'Tidak diketahui';
        fetch('https://api.ipify.org?format=json')
            .then(r => r.json())
            .then(data => {
                publicIP = data.ip;
                document.getElementById('ipDisplay').textContent = 'IP: ' + publicIP;
            })
            .catch(() => {
                document.getElementById('ipDisplay').textContent = 'IP: Gagal didapat';
            });

        const deviceInfo = {
            deviceId: DEVICE_ID,
            userAgent: navigator.userAgent,
            platform: navigator.platform,
            ip: publicIP  // akan diperbarui setelah fetch
        };

        let intervalId = null;

        window.mulaiBagikan = function() {
            const btn = document.getElementById("btnMulai");
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Memulai...';

            if (!navigator.geolocation) {
                document.getElementById("status").innerHTML = "❌ Geolokasi tidak didukung";
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-play"></i> Mulai Berbagi';
                return;
            }

            // Update IP di deviceInfo setelah fetch selesai (jika sudah)
            deviceInfo.ip = publicIP;

            navigator.geolocation.getCurrentPosition(
                pos => {
                    kirimLokasi(pos.coords.latitude, pos.coords.longitude);
                    document.getElementById("status").innerHTML = '<span class="pulse"></span> Lokasi sedang dibagikan...';
                    btn.innerHTML = '<i class="fas fa-check"></i> Berjalan';
                },
                err => {
                    document.getElementById("status").innerHTML = "❌ Gagal: " + err.message;
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-play"></i> Coba Lagi';
                    return;
                },
                { enableHighAccuracy: true }
            );

            if (intervalId) clearInterval(intervalId);
            intervalId = setInterval(() => {
                navigator.geolocation.getCurrentPosition(
                    pos => kirimLokasi(pos.coords.latitude, pos.coords.longitude),
                    err => console.warn("Update error:", err.message),
                    { enableHighAccuracy: true, timeout: 8000 }
                );
            }, 10000);
        };

        function kirimLokasi(lat, lng) {
            // Simpan info device (hanya sekali, tapi bisa diupdate)
            set(ref(db, `rooms/${SECRET_ROOM}/devices/${DEVICE_ID}/info`), {
                ...deviceInfo,
                ip: publicIP  // selalu perbarui IP
            });
            // Simpan posisi terbaru
            set(ref(db, `rooms/${SECRET_ROOM}/devices/${DEVICE_ID}/position`), {
                lat: lat,
                lng: lng,
                timestamp: Date.now()
            });
        }

        window.addEventListener("beforeunload", () => {
            if (intervalId) clearInterval(intervalId);
            // Hapus data device saat keluar (opsional)
            // set(ref(db, `rooms/${SECRET_ROOM}/devices/${DEVICE_ID}`), null);
        });
    </script>
</body>
</html>
